<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binerly — KOBİ Satış Takip</title>
    <meta name="theme-color" content="#185fa5" />
    <meta name="description" content="KOBİ'ler için müşteri ilişkileri, satış ve destek yönetimi." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
      :root {
        --bg: #f5f8fc;
        --surface-1: #ffffff;
        --surface-2: #ffffff;
        --border: #e1e8f0;
        --border-strong: #185fa5;
        --text-primary: #0c2540;
        --text-secondary: #5b7088;
        --text-muted: #94a7bb;
        --text-success: #15803d;
        --text-warning: #b45309;
        --text-accent: #185fa5;
        --bg-success: #dcfce7;
        --fill-success: #15803d;
        --bg-warning: #fef3c7;
        --text-danger: #b91c1c;
        --bg-danger: #fee2e2;
        --bg-accent: #e6f1fb;
        --fill-accent: #185fa5;
        --fill-warning: #f59e0b;
        --on-accent: #ffffff;
        --radius: 10px;
      }
      [data-theme="dark"] {
        --bg: #0f1720;
        --surface-1: #1a2532;
        --surface-2: #1e2a38;
        --border: #2d3b4a;
        --border-strong: #4a90d9;
        --text-primary: #e8edf2;
        --text-secondary: #9fb0c0;
        --text-muted: #6b7f92;
        --text-success: #4ade80;
        --text-warning: #fbbf24;
        --text-accent: #6ba9dd;
        --bg-success: #14532d;
        --fill-success: #22c55e;
        --bg-warning: #451a03;
        --text-danger: #f87171;
        --bg-danger: #4c0d0d;
        --bg-accent: #1e3a5f;
        --fill-accent: #4a90d9;
        --fill-warning: #f59e0b;
        --on-accent: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      button {
        font-family: inherit;
        font-size: 14px;
        padding: 8px 14px;
        border-radius: var(--radius);
        border: 0.5px solid var(--border);
        background: var(--surface-1);
        color: var(--text-primary);
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input, select, textarea {
        font-family: inherit;
        font-size: 14px;
        padding: 8px 10px;
        border-radius: var(--radius);
        border: 0.5px solid var(--border);
        background: var(--surface-1);
        color: var(--text-primary);
      }
      /* #root'a genişlik sınırı KONULMUYOR — landing page/portal/yasal sayfalar/
         yönetici sayfası tam genişlik olmalı. Sadece giriş sonrası panel (App.jsx
         Dashboard) kendi wrapper'ında max-width:980px kullanıyor. */
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      .info-tip { position: relative; display: inline-flex; align-items: center; }
      .info-tip .info-tip-bubble {
        visibility: hidden;
        opacity: 0;
        position: absolute;
        bottom: calc(100% + 7px);
        left: 50%;
        transform: translateX(-50%);
        background: #0c2540;
        color: #fff;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.4;
        padding: 10px 12px;
        border-radius: 8px;
        width: max-content;
        max-width: 280px;
        z-index: 20;
        transition: opacity 0.12s ease;
        pointer-events: none;
        text-transform: none;
        letter-spacing: normal;
        font-weight: 400;
        white-space: pre-line;
        text-align: left;
      }
      .info-tip:hover .info-tip-bubble,
      .info-tip:focus-visible .info-tip-bubble {
        visibility: visible;
        opacity: 1;
      }
      @media print {
        body * { visibility: hidden; }
        #teklif-print, #teklif-print * { visibility: visible; }
        #teklif-print { position: absolute; top: 0; left: 0; width: 100%; }
        .no-print { display: none !important; }
        @page { size: A4; margin: 16mm; }
      }
      /* Dar ekranlarda navbar'daki ikincil linkler (Hizmetlerimiz/Hakkımızda) taşıp
         kayboluyordu — dar ekranda gizlenir, ilgili bölümlere sayfa kaydırarak zaten ulaşılabilir. */
      @media (max-width: 640px) {
        .landing-nav-links { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
      :root {
        --bg: #f5f8fc;
        --surface-1: #ffffff;
        --surface-2: #ffffff;
        --border: #e1e8f0;
        --border-strong: #185fa5;
        --text-primary: #0c2540;
        --text-secondary: #5b7088;
        --text-muted: #94a7bb;
        --text-success: #15803d;
        --text-warning: #b45309;
        --text-accent: #185fa5;
        --bg-success: #dcfce7;
        --fill-success: #15803d;
        --bg-warning: #fef3c7;
        --text-danger: #b91c1c;
        --bg-danger: #fee2e2;
        --bg-accent: #e6f1fb;
        --fill-accent: #185fa5;
        --fill-warning: #f59e0b;
        --on-accent: #ffffff;
        --radius: 10px;
      }
      [data-theme="dark"] {
        --bg: #0f1720;
        --surface-1: #1a2532;
        --surface-2: #1e2a38;
        --border: #2d3b4a;
        --border-strong: #4a90d9;
        --text-primary: #e8edf2;
        --text-secondary: #9fb0c0;
        --text-muted: #6b7f92;
        --text-success: #4ade80;
        --text-warning: #fbbf24;
        --text-accent: #6ba9dd;
        --bg-success: #14532d;
        --fill-success: #22c55e;
        --bg-warning: #451a03;
        --text-danger: #f87171;
        --bg-danger: #4c0d0d;
        --bg-accent: #1e3a5f;
        --fill-accent: #4a90d9;
        --fill-warning: #f59e0b;
        --on-accent: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      button {
        font-family: inherit;
        font-size: 14px;
        padding: 8px 14px;
        border-radius: var(--radius);
        border: 0.5px solid var(--border);
        background: var(--surface-1);
        color: var(--text-primary);
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input, select, textarea {
        font-family: inherit;
        font-size: 14px;
        padding: 8px 10px;
        border-radius: var(--radius);
        border: 0.5px solid var(--border);
        background: var(--surface-1);
        color: var(--text-primary);
      }
      /* #root'a genişlik sınırı KONULMUYOR — landing page/portal/yasal sayfalar/
         yönetici sayfası tam genişlik olmalı. Sadece giriş sonrası panel (App.jsx
         Dashboard) kendi wrapper'ında max-width:980px kullanıyor. */
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      .info-tip { position: relative; display: inline-flex; align-items: center; }
      .info-tip .info-tip-bubble {
        visibility: hidden;
        opacity: 0;
        position: absolute;
        bottom: calc(100% + 7px);
        left: 50%;
        transform: translateX(-50%);
        background: #0c2540;
        color: #fff;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.4;
        padding: 10px 12px;
        border-radius: 8px;
        width: max-content;
        max-width: 280px;
        z-index: 20;
        transition: opacity 0.12s ease;
        pointer-events: none;
        text-transform: none;
        letter-spacing: normal;
        font-weight: 400;
        white-space: pre-line;
        text-align: left;
      }
      /* Ekranın/modal'ın en üstüne yakın alanlarda (ör. formun ilk etiketi)
         yukarı açılan balon görünüm dışına taşıp okunamaz hale geliyordu —
         bu durumlarda InfoTip'e placement="bottom" verilip aşağı açtırılır. */
      .info-tip .info-tip-bubble--bottom {
        bottom: auto;
        top: calc(100% + 7px);
      }
      .info-tip:hover .info-tip-bubble,
      .info-tip:focus-visible .info-tip-bubble {
        visibility: visible;
        opacity: 1;
      }
      @media print {
        body * { visibility: hidden; }
        #teklif-print, #teklif-print * { visibility: visible; }
        #teklif-print { position: absolute; top: 0; left: 0; width: 100%; }
        .no-print { display: none !important; }
        @page { size: A4; margin: 16mm; }
      }
      /* Dar ekranlarda navbar'daki ikincil linkler (Hizmetlerimiz/Hakkımızda) taşıp
         kayboluyordu — dar ekranda gizlenir, ilgili bölümlere sayfa kaydırarak zaten ulaşılabilir. */
      @media (max-width: 640px) {
        .landing-nav-links { display: none; }
      }
      /* Ana uygulamanın sol sekme menüsü (Pano/Müşteriler/... ) masaüstünde sabit
         200px'lik bir sidebar — telefon genişliğinde (ve özellikle kurulu PWA'da,
         tarayıcı çubuğu olmadığı için alan daha da dar) içerikle sıkışıp taşıyordu.
         Dar ekranda soldan açılan bir çekmeceye dönüşür, hamburger butonuyla açılır. */
      /* IconButton kendi display:flex'ini inline style olarak set ediyor, class
         kuralları normalde onu ezemez — bu yüzden burada da !important gerekiyor. */
      .app-sidebar-toggle { display: none !important; }
      @media (max-width: 860px) {
        .app-sidebar-toggle { display: flex !important; }
        .app-sidebar {
          /* nav'ın inline style'ındaki position:sticky/top:24'ü ezmek için
             !important gerekiyor — inline style aksi halde class'ı kazanır. */
          position: fixed !important;
          top: 0 !important;
          left: 0;
          height: 100vh;
          z-index: 300;
          background: var(--surface-1);
          border-right: 0.5px solid var(--border);
          padding: 16px 12px;
          overflow-y: auto;
          transform: translateX(-100%);
          transition: transform 0.2s ease;
        }
        .app-sidebar.open { transform: translateX(0); }
        .app-sidebar-backdrop {
          position: fixed;
          inset: 0;
          background: rgba(12, 37, 64, 0.4);
          z-index: 290;
        }
      }
      /* Bildirim zili paneli sabit 320px genişlikte ve zil ikonunun sağ kenarına
         hizalı açılıyor — zil ikonu sağdaki ayarlar/çıkış ikonlarının solunda
         durduğu için dar telefon ekranlarında panel sol kenardan taşıyordu.
         Dar ekranda tam genişlik, üstte sabit bir panele dönüşür. */
      @media (max-width: 600px) {
        .notif-dropdown {
          position: fixed !important;
          top: 70px !important;
          left: 12px !important;
          right: 12px !important;
          width: auto !important;
          max-height: calc(100vh - 90px) !important;
        }
      }
      /* Modal'ın sabit 1rem/1.5rem padding'i dar telefon ekranında (ör. 375px)
         içerik alanından ~110px'i tek başına yiyordu — her form/dialog gereksiz
         dar görünüyordu. Dar ekranda padding daraltılır, genişlik korunur. */
      @media (max-width: 420px) {
        .modal-overlay { padding: 0.5rem !important; }
        .modal-card { padding: 1rem !important; }
      }
      /* Mesajlar sekmesi sabit "300px liste + esnek konuşma" grid'i dar ekranda
         neredeyse tüm genişliği listeye ayırıp konuşmayı sıkıştırıyordu. Dar
         ekranda tipik mesajlaşma uygulaması gibi tek seferde ya liste ya da
         seçili konuşma gösterilir, "Konuşmalara dön" ile geri dönülür. */
      @media (max-width: 760px) {
        .messages-grid { grid-template-columns: 1fr !important; }
        .messages-grid[data-has-selection="true"] .msg-list-pane { display: none; }
        .messages-grid[data-has-selection="false"] .msg-thread-pane { display: none; }
        .messages-grid[data-has-selection="true"] .msg-back-button { display: flex !important; }
      }
      /* PDF şablon editörü 3 sabit genişlikli panelden oluşuyor (sol 150px
         blok paleti + orta canvas + sağ 280px özellik paneli) — ikisi toplam
         430px, telefon ekranının çoğunu/tamamını yiyip canvas'ı erişilemez
         bırakıyordu. Dar ekranda ikisi de varsayılan kapalı, üstteki
         "Bloklar"/"Özellikler" butonlarıyla açılan soldan/sağdan çekmecelere
         dönüşüyor (aynı breakpoint'i kullandığından .app-sidebar-backdrop
         burada da paylaşılıyor). */
      .pdf-panel-toggle { display: none; }
      @media (max-width: 860px) {
        .pdf-panel-toggle { display: inline-block; }
        .pdf-block-panel, .pdf-inspector-panel {
          position: fixed;
          top: 0;
          height: 100vh;
          z-index: 300;
          transition: transform 0.2s ease;
        }
        .pdf-block-panel { left: 0; transform: translateX(-100%); }
        .pdf-block-panel.open { transform: translateX(0); }
        .pdf-inspector-panel { right: 0; transform: translateX(100%); }
        .pdf-inspector-panel.open { transform: translateX(0); }
      }
      /* Ajanda'nın 7 sütunlu ay görünümü dar ekranda ~46px genişliğindeki
         hücrelere sabit 72px min-height uyguluyordu — boş günler bile
         gereksiz yere uzun, dar/"ölçüsüz" dikdörtgenler gibi görünüyordu.
         Dar ekranda min-height küçültülüp hücreler kareye yakın, daha
         doğal oranlı görünür; olayı olan günler zaten flex içerik ile
         gerektiği kadar uzuyor. */
      @media (max-width: 480px) {
        .agenda-grid { gap: 2px !important; }
        .agenda-day-cell--ay { min-height: 44px !important; padding: 3px 4px !important; }
        .agenda-day-number { font-size: 11px !important; }
        .agenda-event-pill { font-size: 9px !important; padding: 0 3px !important; }
      }
    </style>
  </head>

    <div id="root"></div>
